<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- 背景圆（柔和米色）-->
  <circle cx="100" cy="100" r="78" fill="#EAE3D6" opacity="0.55"/>
  <!-- 购物车：虚线轮廓，暗示空 -->
  <path d="M52 70 L62 70 L74 126 L136 126 L148 82 L72 82" stroke="#A3ADA7" stroke-width="3.5" stroke-dasharray="5 5"/>
  <!-- 车轮 -->
  <circle cx="84" cy="144" r="7" stroke="#A3ADA7" stroke-width="3" fill="#F4F0EB"/>
  <circle cx="128" cy="144" r="7" stroke="#A3ADA7" stroke-width="3" fill="#F4F0EB"/>
  <!-- 飘落草叶（养生点缀）-->
  <!-- 叶 1：大的在左上 -->
  <path d="M72 52 Q84 38 96 50 Q88 60 72 52 Z" fill="#3F6B5E" opacity="0.75"/>
  <line x1="72" y1="52" x2="94" y2="50" stroke="#2A4A3E" stroke-width="1" opacity="0.6"/>
  <!-- 叶 2：右上 -->
  <path d="M130 44 Q146 40 148 56 Q138 60 130 44 Z" fill="#3F6B5E" opacity="0.6"/>
  <line x1="130" y1="44" x2="148" y2="56" stroke="#2A4A3E" stroke-width="1" opacity="0.5"/>
  <!-- 小叶 3：中间偏下 -->
  <path d="M108 108 Q116 98 122 108 Q116 114 108 108 Z" fill="#3F6B5E" opacity="0.5"/>
  <!-- 圆点（飘动感）-->
  <circle cx="62" cy="96" r="2.5" fill="#A3ADA7" opacity="0.6"/>
  <circle cx="150" cy="104" r="2" fill="#A3ADA7" opacity="0.5"/>
  <circle cx="58" cy="128" r="1.5" fill="#A3ADA7" opacity="0.4"/>
</svg>
